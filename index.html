<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./src/output.css">
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


</head>

<body class="bg-[#000220] h-screen">
    <header class="text-white ">
        <div class="border-2 border-[#535469] ">
            <div class="container py-5 mx-auto flex justify-between items-center ">
                <div class="flex gap-2 lg:w-[15%] ">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        class="text-[#7C3AED] text-9xl" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-chart-bar-stacked-icon lucide-chart-bar-stacked"
                        aria-hidden="true">
                        <path d="M11 13v4" />
                        <path d="M15 5v4" />
                        <path d="M3 3v16a2 2 0 0 0 2 2h16" />
                        <rect x="7" y="13" width="9" height="4" rx="1" />
                        <rect x="7" y="5" width="12" height="4" rx="1" />
                    </svg>
                    <h1 class="text-xl text-[#FFFFFF]">Tasks Dashboard</h1>

                </div>
                <div class="flex justify-between items-center lg:w-[25%] gap-1 ">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        class="text-white text-3xl lucide lucide-search-icon lucide-search" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m21 21-4.34-4.34" />
                        <circle cx="11" cy="11" r="8" aria-hidden="true" />

                    </svg>
                    <form role="search" onsubmit="return false" >
                        <input type="search" class= " search w-85 border-2  border-[#535469] rounded-xl p-2 text-white"
                            placeholder="type here ..." aria-label="search">
                    </form>
                </div>
                <div class=" flex  justify-around lg:w-[10%]">
                    <button aria-label="Analytics" class="  flex items-center justify-between gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-chart-no-axes-column-icon lucide-chart-no-axes-column"
                            aria-hidden="true">
                            <path d="M5 21v-6" />
                            <path d="M12 21V3" />
                            <path d="M19 21V9" />
                        </svg>Analytics</button>
                </div>
            </div>
        </div>

        <section class=" ">
            <div class="container mx-auto ">
                <div role="group" aria-label=" tasks filters" class="filters flex justify-between py-5 w-1/3 items-center">
                    <h2 class="text-white text-xl text-bold">Filters </h2>
                    <button
                        class="text-white py-1 px-4 border border-transparent hover:border-[#7008E7] transition-all duration-400 ease-in rounded-xl">
                        All
                    </button>
                    <button
                        class="text-white py-1 px-4 border border-transparent hover:border-[#7008E7] transition-all duration-400 ease-in rounded-xl">
                        High
                    </button><button
                        class="text-white py-1 px-4 border border-transparent hover:border-[#7008E7] transition-all duration-400 ease-in rounded-xl">
                        Moderate
                    </button><button
                        class="text-white py-1 px-4 border border-transparent hover:border-[#7008E7] transition-all duration-400 ease-in rounded-xl">
                        Low
                    </button>
                </div>
            </div>

        </section>


    </header>


    </svg>
    <main class="flex border-2 border-[#535469] py-4 h-[77%]">
        <section class=" flex justify-between gap-5 container mx-auto ">
            <section class="rounded-lg bg-[#001330]  pb-3 px-3 overflow-y-auto scroll-clean relative w-[500px]  ">
                <header
                    class="text-white text-2xl flex justify-between items-center bg-[#001330] sticky top-0 w-[100%] p-2 ">
                    <div class="flex items-center gap-3">
                        <div>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="size-8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                            </svg>

                        </div>
                        <div class="tasks flex flex-col">
                            <h2 class="text-[#F8FAFC]">TO DO</h2>

                        </div>

                    </div>
                    <button class="add">

                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6 text-[#4F8CFF]">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                    </button>


                </header>

                <div class="cardsGroup h-[80%]" role="group" aria-label="Cards Group"">
                    
            
                </div>

            </section>
            <section class=" rounded-lg bg-[#001330] pb-3 px-3 overflow-y-auto scroll-clean w-[500px] relative h-[530px]">

                    <header
                        class="text-white text-2xl flex justify-between items-center bg-[#001330] sticky top-0 w-[100%] p-2">
                        <div class=" flex gap-3 items-center">
                            <div class="icon">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="size-8">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5A3.375 3.375 0 0 0 6.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0 0 15 2.25h-1.5a2.251 2.251 0 0 0-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 0 0-9-9Z" />
                                </svg>


                            </div>
                            <div class="tasks flex flex-col">
                                <h2 class="text-[#CBD5E1]">In Progress</h2>

                            </div>

                        </div>

                        <button class="add">

                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="size-6 text-[#4F8CFF]">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                            </svg>
                        </button>

                    </header>
                    <div class="cardsGroup h-[410px]" role="group" aria-label="Cards Group"">
                        
                </div>


            </section>
            <section class="rounded-lg bg-[#001330] pb-3 px-3 overflow-y-auto scroll-clean relative w-[500px]">

                        <header
                            class="text-white text-2xl flex justify-between items-center bg-[#001330] sticky top-0 w-[100%] p-2">
                            <div class="flex gap-3 items-center">
                                <div>
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="1.5" stroke="currentColor" class="size-8">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0 1 18 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3 1.5 1.5 3-3.75" />
                                    </svg>



                                </div>
                                <div class="tasks flex flex-col">
                                    <h2 class="text-[#CBD5E1]">Done</h2>

                                </div>
                            </div>

                            <button class="add">

                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="size-6 text-[#4F8CFF]">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                                </svg>
                            </button>



                        </header>
                        <div class="cardsGroup h-[80%]" role="group" aria-label="Cards Group">

                        </div>


            </section>
        </section>

    </main>



    <script type="module" src="./main.js"></script>
</body>

</html>
